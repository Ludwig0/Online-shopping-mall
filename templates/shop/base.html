<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BookStore Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/css/site.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="{% url 'product_list' %}" class="brand">BookStore</a>
        <nav class="nav">
        <a href="{% url 'product_list' %}" class="nav-btn">Shop</a>
        <a href="{% url 'admin_product_list' %}" class="nav-btn">Admin Portal</a>

        {% if user.is_authenticated %}
            <a href="{% url 'order_list' %}" class="nav-btn">My Orders</a>
            <a href="{% url 'cart_detail' %}" class="nav-btn cart-btn">
            Cart ({{ nav_cart_count }})
            </a>

            <form method="post" action="{% url 'logout' %}" class="inline-form">
            {% csrf_token %}
            <button type="submit" class="nav-btn danger-nav-btn">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="nav-btn">Login</a>
            <a href="{% url 'register' %}" class="nav-btn primary-nav-btn">Register</a>
        {% endif %}
        </nav>
    </div>
  </header>

  <main class="container">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
