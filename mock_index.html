<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

<div id="app">
    <h1>{{ mallTitle }}</h1>
    
    <button @click="loadBooks">Explore Our Books</button>

    <div class="book-grid" style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
        <div v-for="book in books" :key="book.id" class="book-card" style="border: 1px solid #ddd; padding: 15px; width: 180px; opacity: 0;">
            <img :src="book.cover" alt="Cover" style="width: 100%; height: 200px; object-fit: cover;">
            <h3 style="font-size: 16px;">{{ book.title }}</h3>
            <p style="font-size: 14px; color: #666;">By {{ book.author }}</p>
            <p style="color: #e4393c; font-weight: bold;">${{ book.price }}</p>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#app',
    data: {
        mallTitle: 'Online AI Bookstore',
        books: []
    },
    methods: {
        loadBooks() {
            // Mock data for a bookstore
            const mockBooks = [
                { id: 1, title: 'Introduction to AI', author: 'Dr. Smith', price: 45.00, cover: 'https://via.placeholder.com/150x200?text=AI+Book' },
                { id: 2, title: 'Python Programming', author: 'Jane Doe', price: 32.50, cover: 'https://via.placeholder.com/150x200?text=Python' },
                { id: 3, title: 'Data Science 101', author: 'Prof. Lee', price: 58.00, cover: 'https://via.placeholder.com/150x200?text=Data' }
            ];
            
            setTimeout(() => {
                this.books = mockBooks;
                this.$nextTick(() => { 
                    this.animateBooks(); 
                });
            }, 500);
        },
        animateBooks() {
            gsap.to(".book-card", {
                duration: 0.8,
                y: -20,
                opacity: 1,
                stagger: 0.2,
                ease: "power2.out"
            });
        }
    }
});
</script>
